name: Build ABI3 wheels

# Build a single wheel per (OS, arch) tagged cp312-abi3 that installs
# unchanged on Python 3.12+ via PEP 384's stable ABI. Driven by passing
# `cmake.define.GRIDCALC_STABLE_ABI=ON` through to scikit-build-core,
# which switches `nanobind_add_module` into STABLE_ABI mode in
# CMakeLists.txt.
#
# Build-only by default. Adopt this matrix for publishing once you've
# decided whether to drop pre-3.12 support; until then, the per-version
# `build-publish.yml` is the authoritative publish path.

on:
  push:
    tags:
      - "v*-abi3"
  pull_request:
    branches: [main, master]
    paths:
      - "src/gridcalc/_core.cpp"
      - "CMakeLists.txt"
      - "thirdparty/OpenXLSX/**"
      - ".github/workflows/build-abi3.yml"
      - "pyproject.toml"
  workflow_dispatch:

env:
  # Single cp tag is enough -- nanobind's STABLE_ABI mode emits
  # `cp312-abi3` regardless. cibuildwheel will run the test command on
  # every Python it knows about that the wheel claims to support.
  CIBW_BUILD: "cp312-*"
  CIBW_SKIP: "*-musllinux_* pp*"
  # Two config settings: `cmake.define.GRIDCALC_STABLE_ABI=ON` switches
  # the nanobind module to STABLE_ABI mode; `wheel.py-api=cp312` tells
  # scikit-build-core to tag the wheel as `cp312-abi3` so a single
  # wheel installs on every Python>=3.12.
  CIBW_CONFIG_SETTINGS: "cmake.define.GRIDCALC_STABLE_ABI=ON wheel.py-api=cp312"
  CIBW_TEST_REQUIRES: pytest
  CIBW_TEST_COMMAND: pytest {project}/tests -v
  CIBW_ENVIRONMENT: GRIDCALC_SANDBOX=1

jobs:
  build-abi3-linux:
    name: Build abi3 wheel (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_ARCHS_LINUX: x86_64 aarch64

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: abi3-wheels-linux
          path: wheelhouse/*.whl
          retention-days: 14

  build-abi3-macos:
    name: Build abi3 wheel (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_ARCHS_MACOS: x86_64 arm64

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: abi3-wheels-macos
          path: wheelhouse/*.whl
          retention-days: 14

  build-abi3-windows:
    name: Build abi3 wheel (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_ARCHS_WINDOWS: AMD64

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: abi3-wheels-windows
          path: wheelhouse/*.whl
          retention-days: 14

  collect-abi3:
    name: Collect abi3 artifacts
    needs: [build-abi3-linux, build-abi3-macos, build-abi3-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux wheel
        uses: actions/download-artifact@v4
        with:
          name: abi3-wheels-linux
          path: dist/

      - name: Download macOS wheel
        uses: actions/download-artifact@v4
        with:
          name: abi3-wheels-macos
          path: dist/

      - name: Download Windows wheel
        uses: actions/download-artifact@v4
        with:
          name: abi3-wheels-windows
          path: dist/

      - name: List artifacts
        run: |
          echo "=== abi3 wheels ==="
          ls -la dist/
          echo ""
          echo "=== Wheel count: $(ls dist/*.whl 2>/dev/null | wc -l) ==="

      - name: Upload combined abi3 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: abi3-all-dist
          path: dist/
          retention-days: 30
